services:
  scanner:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - SHODAN_API_KEY=${SHODAN_API_KEY}
    volumes:
      - ./results:/app/results
    networks:
      - scanner-net

  # Optional: nginx reverse proxy with TLS termination
  # Uncomment if you're not using an existing nginx/caddy on the host
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - scanner
  #   networks:
  #     - scanner-net

networks:
  scanner-net:
    driver: bridge
