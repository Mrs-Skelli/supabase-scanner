server {
    listen 80;
    server_name research.skelli.win;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name research.skelli.win;

    ssl_certificate     /etc/letsencrypt/live/research.skelli.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/research.skelli.win/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Rate limit at nginx level too
    limit_req_zone $binary_remote_addr zone=scanner:10m rate=20r/m;

    location / {
        limit_req zone=scanner burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
